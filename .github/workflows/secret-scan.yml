name: Secret Scanning

on:
  push:                # Scan every push — catches secrets on any branch
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual runs from GitHub UI

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scan full git history, not just latest commit

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config: gitleaks.toml
